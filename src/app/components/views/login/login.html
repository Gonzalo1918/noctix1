<div class="container animate-fade-in" style="max-width: 900px;">
  <div class="card">
    <div class="access-panel">
      <div class="access-text">
        <h1 class="title-small">Acceder</h1>
        <p class="access-sub" style="margin-bottom: 0.5rem;">Iniciá sesión para gestionar eventos en la red Noctix.</p>
        
        @if (errorMessage()) {
          <div class="error-banner animate-fade-in" style="margin-top: 1rem; color: #f87171; font-size: 0.85rem; background: rgba(248, 113, 113, 0.08); border: 1px solid rgba(248, 113, 113, 0.2); padding: 0.75rem 1rem; border-radius: 0.75rem;">
            <span>{{ errorMessage() }}</span>
          </div>
        }
      </div>
      
      <form class="access-form" [formGroup]="loginForm" (ngSubmit)="doLogin()">
        <div class="form-group-horizontal">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="tucorreo@mail.com" />
        </div>
        
        <div class="form-group-horizontal">
          <label>Contraseña</label>
          <input type="password" formControlName="password" placeholder="******" />
        </div>
        
        <button type="submit" class="button-primary submit-btn-horizontal" [disabled]="isLoading() || loginForm.invalid">
          @if (isLoading()) {
            <span style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
              <svg viewBox="0 0 24 24" style="width: 1.15rem; height: 1.15rem; animation: spin 0.8s linear infinite; stroke: currentColor; fill: none; stroke-width: 3;">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"></path>
              </svg>
              Ingresando...
            </span>
          } @else {
            Iniciar Sesión
          }
        </button>
      </form>
    </div>
  </div>
</div>
